name: Supabase Production Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/config.toml"
      - "supabase/migrations/**"
      - ".github/workflows/supabase-production-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  apply:
    name: Apply production migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_ID"

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show pending production migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run

      - name: Apply production migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
