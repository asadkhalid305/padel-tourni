name: Supabase Migration Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "supabase/config.toml"
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migration-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migration-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Apply pending local migrations
        run: supabase migration up --local --include-all

      - name: Lint local database
        run: supabase db lint --local --fail-on error

      - name: Stop local database
        if: always()
        run: supabase stop --no-backup
